<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Reports | CSU-Piat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="toast-container"></div>
<div id="sidebar-container"></div>
<div id="navbar-container"></div>

<main class="main-content" id="mainContent">
  <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <h2><i class="fa-solid fa-file-alt me-2 text-primary"></i>IPCR Reports</h2>
      <p>View, filter, and export submitted IPCR forms.</p>
    </div>
    <div class="d-flex gap-2 no-print">
      <button class="btn btn-outline-success btn-sm" onclick="exportCSV()"><i class="fa-solid fa-file-excel me-1"></i>Export</button>
      <button class="btn btn-outline-secondary btn-sm" onclick="window.print()"><i class="fa-solid fa-print me-1"></i>Print</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="card mb-3">
    <div class="card-body">
      <div class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label">Status</label>
          <select class="form-select form-select-sm" id="statusFilter" onchange="applyFilter()">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="reviewed">Reviewed</option>
            <option value="approved">Approved</option>
            <option value="disapproved">Disapproved</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Department</label>
          <select class="form-select form-select-sm" id="deptFilter" onchange="applyFilter()">
            <option value="">All Departments</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Search</label>
          <div class="search-box w-100">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search name..." oninput="applyFilter()" style="padding-left:32px">
          </div>
        </div>
        <div class="col-md-3">
          <label class="form-label">Date From</label>
          <input type="date" class="form-control form-control-sm" id="dateFrom" onchange="applyFilter()">
        </div>
        <div class="col-md-3">
          <label class="form-label">Date To</label>
          <input type="date" class="form-control form-control-sm" id="dateTo" onchange="applyFilter()">
        </div>
      </div>
    </div>
  </div>

  <div class="table-wrapper">
    <div class="table-header">
      <h6><i class="fa-solid fa-list me-2"></i>Submitted IPCR Forms</h6>
      <small class="text-muted" id="tableInfo"></small>
    </div>
    <div class="table-responsive">
      <table class="table">
        <thead><tr>
          <th>#</th><th>Employee</th><th>Department</th><th>Covered Period</th><th>Submission Date</th><th>Rating</th><th>Status</th><th class="no-print">Action</th>
        </tr></thead>
        <tbody id="reportsTable"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Detail Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fa-solid fa-file-lines me-2"></i>IPCR Form Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary btn-sm" onclick="window.print()"><i class="fa-solid fa-print me-1"></i>Print</button>
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<div id="footer-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../data/mock-data.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/components.js"></script>
<script>
  requireAuth(['admin']);
  initLayout('admin', 'reports', [{ label: 'Reports' }]);

  const allForms = getMockIPCR();
  const adminDepts = getMockDepartments();

  // Populate department filter
  const deptSel = document.getElementById('deptFilter');
  adminDepts.forEach(d => { const o = document.createElement('option'); o.value = d.name; o.textContent = d.name; deptSel.appendChild(o); });

  function applyFilter() {
    const status = document.getElementById('statusFilter').value;
    const search = document.getElementById('searchInput').value.toLowerCase();
    const from = document.getElementById('dateFrom').value;
    const to = document.getElementById('dateTo').value;
    const dept = document.getElementById('deptFilter').value;

    const filtered = allForms.filter(f =>
      (!status || f.status === status) &&
      (!dept || f.department === dept) &&
      (!search || f.userName.toLowerCase().includes(search) || f.department.toLowerCase().includes(search)) &&
      (!from || f.date >= from) &&
      (!to || f.date <= to)
    );

    const tbody = document.getElementById('reportsTable');
    tbody.innerHTML = '';
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" class="text-center py-4 text-muted"><i class="fa-solid fa-inbox me-2"></i>No records found.</td></tr>`;
    } else {
      filtered.forEach((f, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i+1}</td>
          <td><div class="d-flex align-items-center gap-2">
            <div class="avatar" style="width:30px;height:30px;font-size:0.65rem">${f.userName.split(' ').map(n=>n[0]).join('').slice(0,2)}</div>
            <span style="font-size:0.83rem">${f.userName}</span></div></td>
          <td style="font-size:0.8rem">${f.department}</td>
          <td style="font-size:0.8rem">${f.coveredPeriod}</td>
          <td style="font-size:0.8rem">${formatDate(f.date)}</td>
          <td style="font-size:0.83rem">${f.rating > 0 ? f.rating.toFixed(1) : '-'}</td>
          <td>${getStatusBadge(f.status)}</td>
          <td class="no-print"><button class="btn btn-outline-primary btn-sm" onclick='showDetail(${JSON.stringify(f).replace(/'/g,"&#39;")})'><i class="fa-solid fa-eye"></i></button></td>`;
        tbody.appendChild(tr);
      });
    }
    document.getElementById('tableInfo').textContent = `${filtered.length} of ${allForms.length} records`;
  }

  function showDetail(f) {
    const secLabels = { coreFunction: 'Core Function', strategicFunction: 'Strategic Function', supportFunction: 'Support Function' };
    const kpi = getMockKPI();
    const allKpi = [...(kpi.core || []), ...(kpi.strategic || []), ...(kpi.support || [])];
    let html = `<div class="row g-2 mb-3 p-2 bg-light rounded" style="font-size:0.85rem">
      <div class="col-6"><strong>Name:</strong> ${f.userName}</div>
      <div class="col-6"><strong>Department:</strong> ${f.department}</div>
      <div class="col-6"><strong>Position:</strong> ${f.position}</div>
      <div class="col-6"><strong>Period:</strong> ${f.coveredPeriod}</div>
      <div class="col-6"><strong>Status:</strong> ${getStatusBadge(f.status)}</div>
      <div class="col-6"><strong>Rating:</strong> ${f.rating > 0 ? f.rating.toFixed(2) + ' — ' + '' : ''}${getRatingLabel(f.rating)}</div>
    </div>`;
    ['coreFunction', 'strategicFunction', 'supportFunction'].forEach(sec => {
      const items = f[sec];
      if (!items || items.length === 0) return;
      html += `<div class="ipcr-section-header mb-0">${secLabels[sec]}</div>
        <table class="table table-sm mb-3"><thead><tr><th>Indicator</th><th>Accomplishment</th><th>Rating</th><th>Remarks</th></tr></thead><tbody>
        ${items.map(item => { const k = allKpi.find(x => x.id === item.kpiId); return `<tr>
          <td style="font-size:0.8rem">${k?.successIndicator || '-'}</td>
          <td style="font-size:0.8rem">${item.accomplishment || '-'}</td>
          <td style="font-size:0.8rem;text-align:center">${item.rating || '-'}</td>
          <td style="font-size:0.8rem">${item.remarks || '-'}</td></tr>`; }).join('')}</tbody></table>`;
    });
    document.getElementById('detailBody').innerHTML = html;
    new bootstrap.Modal(document.getElementById('detailModal')).show();
  }

  function exportCSV() {
    const rows = [['Name', 'Department', 'Position', 'Covered Period', 'Date', 'Rating', 'Status']];
    allForms.forEach(f => rows.push([f.userName, f.department, f.position, f.coveredPeriod, f.date, f.rating || '-', f.status]));
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'IPCR-Reports.csv'; a.click();
    showToast('Report exported!', 'success');
  }

  applyFilter();
</script>
</body>
</html>
