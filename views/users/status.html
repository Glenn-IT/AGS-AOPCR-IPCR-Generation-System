<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Status | CSU-Piat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="toast-container"></div>
<div id="sidebar-container"></div>
<div id="navbar-container"></div>

<main class="main-content" id="mainContent">
  <div class="page-header">
    <h2><i class="fa-solid fa-eye me-2 text-primary"></i>View Status</h2>
    <p>Track the status of your submitted IPCR forms.</p>
  </div>

  <!-- Status Summary -->
  <div class="row g-3 mb-4" id="statusCards"></div>

  <!-- Timeline Status -->
  <div class="card mb-4" id="submissionCard" style="display:none">
    <div class="card-header"><h6><i class="fa-solid fa-timeline me-2 text-primary"></i>Submission Progress</h6></div>
    <div class="card-body">
      <div class="status-steps" id="statusSteps"></div>
      <div class="mt-3 p-3 rounded" id="statusMessage" style="background:var(--accent)"></div>
    </div>
  </div>

  <!-- Forms Table -->
  <div class="table-wrapper">
    <div class="table-header">
      <h6><i class="fa-solid fa-list me-2"></i>My IPCR Submissions</h6>
    </div>
    <div class="table-responsive">
      <table class="table">
        <thead><tr><th>#</th><th>Covered Period</th><th>Date Submitted</th><th>Overall Rating</th><th>Rating Label</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="statusTable"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Detail Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fa-solid fa-file-lines me-2"></i>IPCR Form Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary btn-sm" onclick="window.print()"><i class="fa-solid fa-print me-1"></i>Print</button>
        <a href="ipcr-form.html" class="btn btn-outline-primary btn-sm"><i class="fa-solid fa-edit me-1"></i>Edit Form</a>
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<div id="footer-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../data/mock-data.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/components.js"></script>
<script>
  const session = requireAuth(['user']);
  initLayout('user', 'status', [{ label: 'View Status' }]);

  const ipcrs = getMockIPCR().filter(f => f.userId === session.id);
  const kpi = getMockKPI();
  const allKpi = [...(kpi.core || []), ...(kpi.strategic || []), ...(kpi.support || [])];

  // Status Cards
  const statuses = [
    { key: 'pending', label: 'Pending', color: 'warning', icon: 'fa-clock' },
    { key: 'reviewed', label: 'Reviewed', color: 'info', icon: 'fa-eye' },
    { key: 'approved', label: 'Approved', color: 'success', icon: 'fa-check-circle' },
    { key: 'disapproved', label: 'Disapproved', color: 'danger', icon: 'fa-times-circle' }
  ];

  const cardsContainer = document.getElementById('statusCards');
  statuses.forEach(s => {
    const count = ipcrs.filter(f => f.status === s.key).length;
    cardsContainer.innerHTML += `<div class="col-sm-6 col-xl-3">
      <div class="stat-card ${s.key === 'pending' ? '' : s.color}">
        <div class="stat-icon"><i class="fa-solid ${s.icon}"></i></div>
        <div class="stat-value">${count}</div>
        <div class="stat-label">${s.label} Forms</div>
      </div></div>`;
  });

  // Latest form progress
  if (ipcrs.length > 0) {
    const latest = ipcrs[ipcrs.length - 1];
    const statusOrder = ['pending', 'reviewed', 'approved'];
    const disapproved = latest.status === 'disapproved';
    const card = document.getElementById('submissionCard');
    card.style.display = '';

    const steps = document.getElementById('statusSteps');
    const stepDefs = [
      { label: 'Submitted', key: 'pending' },
      { label: 'Under Review', key: 'reviewed' },
      { label: 'Final Decision', key: disapproved ? 'disapproved' : 'approved' }
    ];

    const currentIdx = disapproved ? 2 : statusOrder.indexOf(latest.status);
    steps.innerHTML = stepDefs.map((s, i) => {
      const isDone = i < currentIdx;
      const isActive = i === currentIdx;
      const icon = isDone ? '<i class="fa-solid fa-check"></i>' : (i + 1);
      return `<div class="step-item">
        <div class="step-circle ${isDone ? 'done' : isActive ? (disapproved && i === 2 ? 'active' : 'active') : ''}">${icon}</div>
        <div class="step-label ${isActive ? 'active' : ''}">${s.label}</div>
      </div>`;
    }).join('');

    const msgMap = {
      pending: `<i class="fa-solid fa-clock text-warning me-2"></i><strong>Your IPCR is pending review.</strong> It has been submitted and is waiting for your supervisor's review. Covered Period: <strong>${latest.coveredPeriod}</strong>`,
      reviewed: `<i class="fa-solid fa-search text-info me-2"></i><strong>Your IPCR is currently under review.</strong> Your supervisor is evaluating your submission. Please wait for the final decision.`,
      approved: `<i class="fa-solid fa-check-circle text-success me-2"></i><strong>Congratulations! Your IPCR has been approved.</strong> Your overall rating is <strong>${latest.rating.toFixed(2)}</strong>. ${getRatingLabel(latest.rating)}`,
      disapproved: `<i class="fa-solid fa-times-circle text-danger me-2"></i><strong>Your IPCR has been disapproved.</strong> Please review the remarks and submit a revised form. Rating: <strong>${latest.rating > 0 ? latest.rating.toFixed(2) : 'N/A'}</strong>`
    };
    document.getElementById('statusMessage').innerHTML = msgMap[latest.status] || '';
  }

  // Table
  const tbody = document.getElementById('statusTable');
  if (ipcrs.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted"><i class="fa-solid fa-inbox me-2"></i>No IPCR forms submitted yet. <a href="ipcr-form.html">Submit one now.</a></td></tr>`;
  } else {
    ipcrs.forEach((f, i) => {
      tbody.innerHTML += `<tr>
        <td>${i+1}</td>
        <td style="font-size:0.85rem">${f.coveredPeriod}</td>
        <td style="font-size:0.82rem">${formatDate(f.date)}</td>
        <td style="font-size:0.85rem">${f.rating > 0 ? f.rating.toFixed(2) : '-'}</td>
        <td>${getRatingLabel(f.rating)}</td>
        <td>${getStatusBadge(f.status)}</td>
        <td><button class="btn btn-outline-primary btn-sm" onclick='viewDetail(${JSON.stringify(f).replace(/'/g,"&#39;")})'><i class="fa-solid fa-eye"></i></button></td></tr>`;
    });
  }

  function viewDetail(f) {
    const secLabels = { coreFunction: 'Core Function', strategicFunction: 'Strategic Function', supportFunction: 'Support Function' };
    let html = `<div class="row g-2 mb-3 p-2 bg-light rounded" style="font-size:0.85rem">
      <div class="col-6"><strong>Name:</strong> ${f.userName}</div>
      <div class="col-6"><strong>Department:</strong> ${f.department}</div>
      <div class="col-6"><strong>Position:</strong> ${f.position}</div>
      <div class="col-6"><strong>Period:</strong> ${f.coveredPeriod}</div>
      <div class="col-6"><strong>Status:</strong> ${getStatusBadge(f.status)}</div>
      <div class="col-6"><strong>Rating:</strong> ${f.rating > 0 ? f.rating.toFixed(2) : '-'} — ${getRatingLabel(f.rating)}</div>
    </div>`;
    ['coreFunction', 'strategicFunction', 'supportFunction'].forEach(sec => {
      const items = f[sec];
      if (!items || items.length === 0) return;
      html += `<div class="ipcr-section-header mb-0">${secLabels[sec]}</div>
        <table class="table table-sm mb-3"><thead><tr><th>Indicator</th><th>Accomplishment</th><th>Rating</th><th>Remarks</th></tr></thead><tbody>
        ${items.map(item => { const k = allKpi.find(x => x.id === item.kpiId); return `<tr>
          <td style="font-size:0.8rem">${k?.successIndicator || '-'}</td>
          <td style="font-size:0.8rem">${item.accomplishment || '-'}</td>
          <td style="font-size:0.8rem;text-align:center">${item.rating || '-'}</td>
          <td style="font-size:0.8rem">${item.remarks || '-'}</td></tr>`; }).join('')}</tbody></table>`;
    });
    document.getElementById('detailBody').innerHTML = html;
    new bootstrap.Modal(document.getElementById('detailModal')).show();
  }
</script>
</body>
</html>
